<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Work Relationship Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #06070b;
    --surface:    #0e1018;
    --surface2:   #161924;
    --border:     rgba(255,255,255,0.07);
    --text:       #f0f2f8;
    --text-muted: #5a6278;
    --accent:     #00d4ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas { display: block; }

  /* ── Header ──────────────────────────────────────────────── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(6,7,11,0.97) 60%, transparent);
    pointer-events: none;
  }

  #header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #header-left p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  #stats { display: flex; gap: 20px; }

  .stat-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: block;
    margin-top: 3px;
  }

  /* ── Side Panels ─────────────────────────────────────────── */
  .side-panel {
    position: fixed;
    left: 16px;
    z-index: 100;
    width: 210px;
    background: rgba(14,16,24,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: height 0.28s cubic-bezier(0.4,0,0.2,1);
  }

  #panel-communities { bottom: 16px; }
  #panel-functions   { bottom: 16px; } /* repositioned by JS */

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 11px;
    cursor: pointer;
    user-select: none;
  }

  .panel-header:hover { background: rgba(255,255,255,0.04); }

  .panel-title {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-muted);
    flex: 1;
  }

  .panel-count-pill {
    font-size: 9px;
    background: rgba(255,255,255,0.07);
    color: var(--text-muted);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .panel-toggle svg {
    width: 10px; height: 10px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.25s;
  }

  .side-panel.collapsed .panel-toggle svg { transform: rotate(-90deg); }

  .panel-divider { height: 1px; background: var(--border); }

  .panel-body {
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 6px 10px;
    max-height: 300px;
  }

  .panel-body::-webkit-scrollbar       { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .panel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .panel-item:hover  { background: rgba(255,255,255,0.06); }
  .panel-item.active { background: rgba(255,255,255,0.09); }

  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
  }

  .func-chip {
    width: 3px; height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .panel-label {
    font-size: 11px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-num {
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ── Zoom Controls ───────────────────────────────────────── */
  #controls {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .ctrl-btn:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.15);
  }

  /* ── Tooltip ─────────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 240px;
  }

  #tooltip.visible { opacity: 1; }

  .tooltip-inner {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 13px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .tooltip-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .tooltip-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    margin-bottom: 5px;
  }

  .tooltip-key {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    min-width: 68px;
    flex-shrink: 0;
  }

  .tooltip-val { font-size: 11px; color: var(--text); }

  /* ── SVG Graph States ────────────────────────────────────── */
  .node circle { cursor: pointer; }
  .node text   { pointer-events: none; user-select: none; }

  .link             { stroke-opacity: 0.32; transition: stroke-opacity 0.2s; }
  .link.highlighted { stroke-opacity: 1; }
  .link.dimmed      { stroke-opacity: 0.03; }

  .node.dimmed circle { opacity: 0.06; }
  .node.dimmed text   { opacity: 0.05; }

  /* ── Search ──────────────────────────────────────────────── */
  #search-wrap {
    position: fixed;
    top: 70px; right: 24px;
    z-index: 100;
  }

  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus       { border-color: rgba(0,212,255,0.5); }
  #search::placeholder { color: var(--text-muted); }

  /* ── Hint ────────────────────────────────────────────────── */
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <h1>Work Relationship Network</h1>
    <p>Nodes by eigenvector centrality · Colors by community detection</p>
  </div>
  <div id="stats">
    <div class="stat">
      <span class="stat-val" id="stat-nodes">—</span>
      <span class="stat-lbl">Members</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-edges">—</span>
      <span class="stat-lbl">Connections</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-communities">—</span>
      <span class="stat-lbl">Communities</span>
    </div>
  </div>
</div>

<div id="search-wrap">
  <input id="search" type="text" placeholder="Search member…" autocomplete="off">
</div>

<svg id="canvas"></svg>

<div id="panel-communities" class="side-panel">
  <div class="panel-header" id="toggle-communities">
    <span class="panel-title">Communities</span>
    <span class="panel-count-pill" id="comm-count-pill">—</span>
    <span class="panel-toggle">
      <svg viewBox="0 0 10 10"><polyline points="2,4 5,7 8,4"/></svg>
    </span>
  </div>
  <div class="panel-divider"></div>
  <div class="panel-body" id="community-items"></div>
</div>

<div id="panel-functions" class="side-panel">
  <div class="panel-header" id="toggle-functions">
    <span class="panel-title">Functions</span>
    <span class="panel-count-pill" id="func-count-pill">—</span>
    <span class="panel-toggle">
      <svg viewBox="0 0 10 10"><polyline points="2,4 5,7 8,4"/></svg>
    </span>
  </div>
  <div class="panel-divider"></div>
  <div class="panel-body" id="function-items"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="zoom-in"    title="Zoom in">+</button>
  <button class="ctrl-btn" id="zoom-out"   title="Zoom out">−</button>
  <button class="ctrl-btn" id="zoom-reset" title="Reset view">⊙</button>
</div>

<div id="hint">Scroll to zoom · Drag to pan · Click node to highlight</div>

<div id="tooltip">
  <div class="tooltip-inner">
    <div class="tooltip-name" id="tt-name"></div>
    <div class="tooltip-row"><span class="tooltip-key">Function</span>   <span class="tooltip-val" id="tt-func"></span></div>
    <div class="tooltip-row"><span class="tooltip-key">Band</span>       <span class="tooltip-val" id="tt-band"></span></div>
    <div class="tooltip-row"><span class="tooltip-key">Effort</span>     <span class="tooltip-val" id="tt-effort"></span></div>
    <div class="tooltip-row"><span class="tooltip-key">Connections</span><span class="tooltip-val" id="tt-degree"></span></div>
    <div class="tooltip-row"><span class="tooltip-key">Centrality</span> <span class="tooltip-val" id="tt-cent"></span></div>
    <div class="tooltip-row"><span class="tooltip-key">Community</span>  <span class="tooltip-val" id="tt-comm"></span></div>
  </div>
</div>

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const W = window.innerWidth;
const H = window.innerHeight;
const svg  = d3.select('#canvas').attr('width', W).attr('height', H);
const defs = svg.append('defs');

svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#06070b');

const container = svg.append('g').attr('id', 'container');

// ─── GLOW FILTERS ────────────────────────────────────────────────────────────
function makeGlowFilter(id, stdDev, blurPasses) {
  const f = defs.append('filter').attr('id', id)
    .attr('x', '-60%').attr('y', '-60%').attr('width', '220%').attr('height', '220%');
  f.append('feGaussianBlur').attr('stdDeviation', stdDev).attr('result', 'blur');
  const merge = f.append('feMerge');
  for (let i = 0; i < blurPasses; i++) merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');
}
makeGlowFilter('glow',      4.5, 2); // node rings — strong glow
makeGlowFilter('glow-soft', 2.5, 1); // edges — subtle glow

// ─── COLOR SETUP ─────────────────────────────────────────────────────────────
const PALETTE = [
  '#00d4ff', '#ff6b2b', '#00e87a', '#ff3d6b', '#ffd600',
  '#b44fff', '#ff2ef7', '#00ffc8', '#ff9500', '#4daaff',
  '#e8ff00', '#ff4d4d',
];

const FUNC_PALETTE = [
  '#4f9cf9','#f97316','#22c55e','#a855f7','#f43f5e',
  '#06b6d4','#eab308','#ec4899','#84cc16','#fb923c',
  '#8b5cf6','#14b8a6','#f59e0b','#6366f1','#10b981',
];

const communities = [...new Set(GRAPH_DATA.nodes.map(n => n.community))].sort((a, b) => a - b);
const colorMap    = Object.fromEntries(communities.map((c, i) => [c, PALETTE[i % PALETTE.length]]));

// ─── NODE + EDGE DATA ─────────────────────────────────────────────────────────
// Clone so D3 simulation mutations don't touch original data
const nodes = GRAPH_DATA.nodes.map(d => ({ ...d }));
const edges = GRAPH_DATA.edges.map(d => ({ ...d }));

// Precompute radius once per node (avoids calling radiusScale repeatedly in attr chains)
const [minC, maxC] = d3.extent(nodes, d => d.centrality);
const radiusScale  = d3.scalePow().exponent(0.4).domain([minC, maxC]).range([4, 36]);
nodes.forEach(d => { d.r = radiusScale(d.centrality); });

// O(1) node lookup — replaces nodes.find() in all highlight/draw callbacks
const nodeMap = new Map(nodes.map(n => [n.id, n]));

// ─── AGGREGATION (single pass) ────────────────────────────────────────────────
const commGroups = {};
const funcGroups = {};
nodes.forEach(n => {
  const c = n.community;
  const f = n.function || 'Other';
  if (!commGroups[c]) commGroups[c] = [];
  commGroups[c].push(n);
  funcGroups[f] = (funcGroups[f] || 0) + 1;
});

// ─── STATS ───────────────────────────────────────────────────────────────────
document.getElementById('stat-nodes').textContent       = nodes.length;
document.getElementById('stat-edges').textContent       = edges.length;
document.getElementById('stat-communities').textContent = communities.length;

// ─── PANELS ──────────────────────────────────────────────────────────────────
function makeCollapsible(panelId, toggleId) {
  const panel  = document.getElementById(panelId);
  const toggle = document.getElementById(toggleId);
  const body   = panel.querySelector('.panel-body');
  const header = panel.querySelector('.panel-header');
  const getH   = () => header.offsetHeight + 1 + Math.min(body.scrollHeight, 300) + 10;
  let collapsed = false;
  panel.style.height = getH() + 'px';
  toggle.addEventListener('click', () => {
    collapsed = !collapsed;
    panel.classList.toggle('collapsed', collapsed);
    panel.style.height = (collapsed ? header.offsetHeight : getH()) + 'px';
    setTimeout(positionPanels, 300);
  });
}

function positionPanels() {
  const pComm = document.getElementById('panel-communities');
  document.getElementById('panel-functions').style.bottom = (16 + pComm.offsetHeight + 8) + 'px';
}

function clearActiveItems() {
  document.querySelectorAll('.panel-item.active').forEach(el => el.classList.remove('active'));
}

// Communities panel
const COMM_LABELS = GRAPH_DATA.communityLabels || {};
const commBody    = document.getElementById('community-items');
let activeComm    = null;

Object.keys(commGroups).sort((a, b) => +a - +b).forEach(c => {
  const color = colorMap[c];
  const item  = document.createElement('div');
  item.className = 'panel-item';
  item.innerHTML = `
    <div class="panel-dot" style="color:${color}"></div>
    <span class="panel-label">${COMM_LABELS[c] || 'Community ' + c}</span>
    <span class="panel-num">${commGroups[c].length}</span>`;
  item.addEventListener('click', () => {
    const cNum = +c;
    if (activeComm === cNum) { activeComm = null; resetHighlight(); return; }
    clearActiveItems();
    item.classList.add('active');
    activeComm = cNum;
    currentSelected = null;
    highlightCommunity(cNum);
  });
  commBody.appendChild(item);
});
document.getElementById('comm-count-pill').textContent = Object.keys(commGroups).length;

// Functions panel
const funcBody  = document.getElementById('function-items');
const funcList  = Object.entries(funcGroups).sort((a, b) => b[1] - a[1]);
const funcColor = Object.fromEntries(funcList.map(([f], i) => [f, FUNC_PALETTE[i % FUNC_PALETTE.length]]));
let activeFunc  = null;

funcList.forEach(([func, count]) => {
  const item = document.createElement('div');
  item.className = 'panel-item';
  item.innerHTML = `
    <div class="func-chip" style="background:${funcColor[func]}"></div>
    <span class="panel-label">${func}</span>
    <span class="panel-num">${count}</span>`;
  item.addEventListener('click', () => {
    if (activeFunc === func) { activeFunc = null; resetHighlight(); return; }
    clearActiveItems();
    item.classList.add('active');
    activeFunc = func;
    currentSelected = null;
    highlightFunction(func);
  });
  funcBody.appendChild(item);
});
document.getElementById('func-count-pill').textContent = funcList.length;

setTimeout(() => {
  makeCollapsible('panel-communities', 'toggle-communities');
  makeCollapsible('panel-functions',   'toggle-functions');
  positionPanels();
}, 60);

// ─── SIMULATION ──────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(nodes)
  .force('link',    d3.forceLink(edges).id(d => d.id)
                      .distance(d => 160 / Math.sqrt(d.weight || 1))
                      .strength(0.25))
  .force('charge',  d3.forceManyBody().strength(-420).distanceMax(800))
  .force('center',  d3.forceCenter(W / 2, H / 2))
  .force('collide', d3.forceCollide(d => d.r + 14))
  .alphaDecay(0.012);

// ─── DRAW EDGES ──────────────────────────────────────────────────────────────
const [wMin, wMax] = d3.extent(edges, d => d.weight);
const strokeScale  = d3.scaleLinear().domain([wMin, wMax]).range([0.5, 2.2]);

const link = container.append('g').attr('class', 'edges')
  .selectAll('.link').data(edges).join('line')
  .attr('class', 'link')
  .attr('stroke',       d => { const s = nodeMap.get(d.source.id || d.source); return s ? colorMap[s.community] : '#888'; })
  .attr('stroke-width', d => strokeScale(d.weight))
  .style('filter', 'url(#glow-soft)');

// ─── DRAW NODES ──────────────────────────────────────────────────────────────
const node = container.append('g').attr('class', 'nodes')
  .selectAll('.node').data(nodes).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

// Atmospheric halo
node.append('circle')
  .attr('r',              d => d.r + 12)
  .attr('fill',           'none')
  .attr('stroke',         d => colorMap[d.community])
  .attr('stroke-opacity', d => d.centrality > 0.06 ? 0.08 : 0.04)
  .attr('stroke-width',   10)
  .style('filter',        'url(#glow)');

// Main crisp ring
node.append('circle')
  .attr('r',            d => d.r)
  .attr('fill',         'none')
  .attr('stroke',       d => colorMap[d.community])
  .attr('stroke-width', d => d.r > 20 ? 3 : d.r > 10 ? 2.2 : 1.6)
  .style('filter',      'url(#glow)');

// Center pip
node.append('circle')
  .attr('r',            d => Math.max(1.2, d.r * 0.12))
  .attr('fill',         d => colorMap[d.community])
  .attr('fill-opacity', 0.9);

// Editorial labels — white, above each ring
node.append('text')
  .text(d => d.id)
  .attr('dy',           d => -(d.r + 8))
  .attr('text-anchor',  'middle')
  .attr('font-size',    d => d.r > 22 ? '15px' : d.r > 14 ? '13px' : d.r > 8 ? '11px' : '10px')
  .attr('fill',         '#ffffff')
  .attr('fill-opacity', d => d.r > 14 ? 1 : d.r > 8 ? 0.88 : 0.65)
  .style('font-family',     "'Inter', sans-serif")
  .style('font-weight',     d => d.r > 14 ? '600' : '400')
  .style('letter-spacing',  d => d.r > 14 ? '0.01em' : '0');

// ─── SIMULATION TICK ─────────────────────────────────────────────────────────
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ─── ZOOM ────────────────────────────────────────────────────────────────────
const zoom = d3.zoom().scaleExtent([0.15, 5])
  .on('zoom', e => container.attr('transform', e.transform));
svg.call(zoom);

document.getElementById('zoom-in').onclick    = () => svg.transition().call(zoom.scaleBy, 1.35);
document.getElementById('zoom-out').onclick   = () => svg.transition().call(zoom.scaleBy, 0.75);
document.getElementById('zoom-reset').onclick = () => svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let currentSelected = null;

function positionTooltip(event) {
  const tw = 250, th = 140, pad = 16;
  let x = event.clientX + 18;
  let y = event.clientY - 20;
  if (x + tw > W) x = event.clientX - tw - 18;
  if (y + th > H) y = H - th - pad;
  if (y < pad)    y = pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

node
  .on('mouseover', (event, d) => {
    tooltip.classList.add('visible');
    document.getElementById('tt-name').textContent   = d.id;
    document.getElementById('tt-func').textContent   = d.function || '—';
    document.getElementById('tt-band').textContent   = [d.band1, d.band2].filter(Boolean).join(', ') || '—';
    document.getElementById('tt-effort').textContent = d.effort || '—';
    document.getElementById('tt-degree').textContent = d.degree;
    document.getElementById('tt-cent').textContent   = d.centrality.toFixed(4);
    const ttComm = document.getElementById('tt-comm');
    ttComm.textContent = d.communityLabel || 'Community ' + d.community;
    ttComm.style.color = colorMap[d.community];
    positionTooltip(event);
  })
  .on('mousemove', positionTooltip)
  .on('mouseout',  () => tooltip.classList.remove('visible'))
  .on('click', (event, d) => {
    event.stopPropagation();
    if (currentSelected === d.id) { resetHighlight(); currentSelected = null; return; }
    currentSelected = d.id;
    highlightNode(d);
  });

svg.on('click', () => { resetHighlight(); currentSelected = null; });

// ─── HIGHLIGHT HELPERS ────────────────────────────────────────────────────────
// After simulation runs, source/target are always objects — but we guard both
const getIds = e => ({ sid: e.source.id || e.source, tid: e.target.id || e.target });

function highlightNode(d) {
  const connected = new Set([d.id]);
  edges.forEach(e => {
    const { sid, tid } = getIds(e);
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  node.classed('dimmed', n => !connected.has(n.id));
  link
    .classed('dimmed',      e => { const { sid, tid } = getIds(e); return sid !== d.id && tid !== d.id; })
    .classed('highlighted', e => { const { sid, tid } = getIds(e); return sid === d.id || tid === d.id; });
}

function highlightCommunity(c) {
  node.classed('dimmed', n => n.community !== c);
  link
    .classed('highlighted', false)
    .classed('dimmed', e => {
      const { sid, tid } = getIds(e);
      const s = nodeMap.get(sid), t = nodeMap.get(tid);
      return !(s && t && s.community === c && t.community === c);
    });
}

function highlightFunction(func) {
  node.classed('dimmed', n => (n.function || 'Other') !== func);
  link
    .classed('highlighted', false)
    .classed('dimmed', e => {
      const { sid, tid } = getIds(e);
      const s = nodeMap.get(sid), t = nodeMap.get(tid);
      return !s || !t || (s.function || 'Other') !== func || (t.function || 'Other') !== func;
    });
}

function resetHighlight() {
  clearActiveItems();
  node.classed('dimmed', false);
  link.classed('dimmed', false).classed('highlighted', false);
  activeFunc = null;
  activeComm = null;
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function () {
  const q = this.value.toLowerCase().trim();
  if (!q) { resetHighlight(); return; }
  const matched = new Set(nodes.filter(n => n.id.toLowerCase().includes(q)).map(n => n.id));
  if (!matched.size) return;
  node.classed('dimmed', n => !matched.has(n.id));
  link
    .classed('highlighted', false)
    .classed('dimmed', e => {
      const { sid, tid } = getIds(e);
      return !matched.has(sid) || !matched.has(tid);
    });
});
</script>
</body>
</html>
